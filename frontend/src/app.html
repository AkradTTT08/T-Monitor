<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%230f172a'/><path d='M20 50 h 15 l 10 -25 l 15 50 l 15 -25 l 5 0 h 15' fill='none' stroke='%2306b6d4' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'/><circle cx='80' cy='20' r='10' fill='%2334d399'/></svg>" />
	<title>T-Monitor Diagnostics</title>
	%sveltekit.head%
	<script>
		window.__frontend_errors__ = [];
		window.addEventListener('error', function (event) {
			window.__frontend_errors__.push(event.message || event.error?.message);
			document.body.insertAdjacentHTML('afterbegin', '<div style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:10px;font-size:14px;max-height:200px;overflow:auto;pointer-events:none;">ERROR: ' + (event.error?.message || event.message) + '<br>' + (event.error?.stack || '') + '</div>');
		});
		window.addEventListener('unhandledrejection', function (event) {
			document.body.insertAdjacentHTML('afterbegin', '<div style="position:fixed;top:50px;left:0;z-index:9999;background:orange;color:white;padding:10px;font-size:14px;max-height:200px;overflow:auto;pointer-events:none;">REJECTION: ' + (event.reason?.message || event.reason) + '<br>' + (event.reason?.stack || '') + '</div>');
		});
	</script>
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
