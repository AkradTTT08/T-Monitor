# .air.toml
# Config for [Air](https://github.com/cosmtrek/air)

root = "."
test_dir = ""
tmp_dir = "tmp"

[build]
  # Build terminal command
  cmd = "go build -o ./tmp/api-runner.exe ./cmd/main.go"
  # Target binary path
  bin = "tmp/api-runner.exe"
  # Delay before rebuilding
  delay = 1000 # ms
  # Directory to exclude
  exclude_dir = ["assets", "tmp", "vendor", "test", "uploads", ".vscode"]
  # Watch these extensions
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  # Kill the process before rebuilding
  kill_delay = "0s"
  # Log binary errors
  log = "build-errors.log"
  # Stop on error
  stop_on_error = true
  # Send interrupt signal before killing
  send_interrupt = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
