
services:
  database:
    image: postgres:15-alpine
    container_name: monitor-postgres
    restart: always
    ports:
      - "5440:5432"
    environment:
      - POSTGRES_USER=monitor_user
      - POSTGRES_PASSWORD=monitor_password
      - POSTGRES_DB=monitor_db
      - TZ=Asia/Bangkok
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - monitor-network

  ollama:
    image: ollama/ollama:latest
    container_name: monitor-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - monitor-network

  ollama-init:
    image: ollama/ollama:latest
    container_name: monitor-ollama-init
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for Ollama to start...' &&
        sleep 10 &&
        echo 'Pulling Llama 3.2 model...' &&
        ollama pull llama3.2 &&
        echo 'Model pulled successfully!'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    networks:
      - monitor-network
    restart: "no"

  backend:
    build:
      context: ./backend
    container_name: monitor-backend
    restart: always
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USER=monitor_user
      - DB_PASSWORD=monitor_password
      - DB_NAME=monitor_db
      - DB_SSLMODE=disable
      - JWT_SECRET_KEY=yoursupersecurejwtsecretkey
      - N8N_WEBHOOK_URL=http://localhost:5678/webhook/api-healthcheck
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - database
      - ollama
    networks:
      - monitor-network

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://203.151.56.27:8082
    container_name: monitor-frontend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - HOST=0.0.0.0
    depends_on:
      - backend
    networks:
      - monitor-network

networks:
  monitor-network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads:
  ollama_data:
